name: Morning Digest

on:
  schedule:
    # 04:00 UTC = 07:00 Israel time (DST) - הקדמה כדי לפצות על עיכובי GitHub Actions
    # כך שגם אם GitHub מאחר בשעה-שעתיים, הדוח מגיע בסביבות 08:00-09:00
    - cron: "0 4 * * *"
  workflow_dispatch: {}

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-genai google-api-python-client google-auth requests

      - name: Run morning digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IAC_TOKEN: ${{ secrets.IAC_TOKEN }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
          ICAL_URL: ${{ secrets.ICAL_URL }}
        run: python morning_digest.py
